# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         mimofan Configuration                               ║
# ║                                                                              ║
# ║  Terminal coding agent for DeepSeek.                                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# 关于配置的加载方式（profiles、环境变量覆盖等），请参见 `docs/CONFIGURATION.md`。

# ─────────────────────────────────────────────────────────────────────────────────
# 默认服务商及默认配置
# ─────────────────────────────────────────────────────────────────────────────────
# 选择默认使用的服务商。现在主要推荐使用 [profiles.xxx] 来管理多套环境。
# 为了向后兼容，如果未指定 provider，顶层的 `api_key` 和 `base_url` 依然被视为默认配置。
provider = "deepseek"
api_key = "YOUR_DEEPSEEK_API_KEY" # 必须非空
base_url = "https://api.deepseek.com/beta"
# provider = "deepseek-cn"                       # 官方 API 的国内别名
# base_url = "https://api.deepseek.com"          # 不使用 beta 测试特性
# 可选：为兼容 OpenAI 协议的网关自定义请求头
# http_headers = { "X-Model-Provider-Id" = "your-model-provider" }

# ─────────────────────────────────────────────────────────────────────────────────
# 默认模型
# ─────────────────────────────────────────────────────────────────────────────────
# DeepSeek V4 系列：
#   deepseek-v4-pro             — 旗舰推理模型
#   deepseek-v4-flash           — 快速、高性价比模型
#   mimo-v2.5-pro               — Xiaomi MiMo Pro 模型
default_text_model = "deepseek-v4-pro"

# ─────────────────────────────────────────────────────────────────────────────────
# 推理模式 (思考深度)
# ─────────────────────────────────────────────────────────────────────────────────
# "off"    — 禁用思维链 (thinking.type = disabled)
# "low"    — 映射为 "high"
# "medium" — 映射为 "high"
# "high"   — reasoning_effort = high (默认)
# "max"    — reasoning_effort = max (最深度的推理)
#
# 在 TUI 界面按 Shift+Tab 可在 off / high / max 之间切换。
reasoning_effort = "max"

# ─────────────────────────────────────────────────────────────────────────────────
# 成本显示
# ─────────────────────────────────────────────────────────────────────────────────
# 显示估算的消耗（美元 usd 或 人民币 cny）。
cost_currency = "usd" # usd | cny

# ─────────────────────────────────────────────────────────────────────────────────
# 启动时检查更新
# ─────────────────────────────────────────────────────────────────────────────────
# 默认在后台检查是否有新版本。如果在内网环境，可设为 false。
[update]
check_for_updates = true

# ─────────────────────────────────────────────────────────────────────────────────
# 快捷操作槽位 (Hotbar)
# ─────────────────────────────────────────────────────────────────────────────────
# 侧边栏的快捷按钮 1-8。若未配置，则使用内置默认操作。
# 可配置为执行特定的斜杠命令。
# [[hotbar]]
# slot = 1
# label = "voice"
# action = "voice.toggle"

# ─────────────────────────────────────────────────────────────────────────────────
# 路径配置
# ─────────────────────────────────────────────────────────────────────────────────
# 所有产品状态默认存储在 ~/.mimofan/ 下。
skills_dir = "~/.mimofan/skills"
mcp_config_path = "~/.mimofan/mcp.json"
notes_path = "~/.mimofan/notes.txt"
memory_path = "~/.mimofan/memory.md"

# ─────────────────────────────────────────────────────────────────────────────────
# 用户记忆 (User memory)
# ─────────────────────────────────────────────────────────────────────────────────
# 开启后，TUI 在启动时读取 memory_path，并作为系统提示词注入给模型。
[memory]
# enabled = true            # 是否开启记忆功能 (默认: false)

# 语音/TTS 输出目录
[speech]
# output_dir = "./speech"

# ─────────────────────────────────────────────────────────────────────────────────
# 安全设置 (Security)
# ─────────────────────────────────────────────────────────────────────────────────
allow_shell = true
approval_policy = "on-request" # on-request | untrusted | never
sandbox_mode = "workspace-write" # read-only | workspace-write | danger-full-access | external-sandbox

# 权限规则配置保存在同目录下的 `permissions.toml` 文件中，不在本文件配置。

# ─────────────────────────────────────────────────────────────────────────────────
# 外部沙盒执行 (External Sandbox Backend)
# ─────────────────────────────────────────────────────────────────────────────────
# 配置远程沙盒来替代本地执行。
# sandbox_backend = "none"          # "none" (默认) 或 "opensandbox"
# sandbox_url = "http://localhost:8080"
# sandbox_api_key = "YOUR_API_KEY"

# auto_allow: 自动批准执行的命令前缀，例如 ["cargo check", "npm run"]
# auto_allow = []

# 子 Agent 最大并发限制
max_subagents = 10 # (1-20)


# ─────────────────────────────────────────────────────────────────────────────────
# 网页搜索支持 (Web Search Provider)
# ─────────────────────────────────────────────────────────────────────────────────
# 选择 web_search 背后使用的搜索引擎。默认是 DuckDuckGo（不需要 API 密钥）。
# 也可以配置使用 Tavily, Bocha, Metaso, Baidu, Volcengine, Sofya 等。
#
# [search]
# provider = "duckduckgo"  # duckduckgo | bing | tavily | bocha | metaso | searxng | baidu | volcengine | sofya
#                            # bocha:      https://bochaai.com — 博查AI搜索，国内友好，需 api_key
#                            # metaso:     https://metaso.cn — 秘塔AI搜索
# api_key = "YOUR_SEARCH_KEY" # 某些服务需要提供 API 密钥

# ─────────────────────────────────────────────────────────────────────────────────
# 网络策略 (Network Policy)
# ─────────────────────────────────────────────────────────────────────────────────
# 控制工具（如 fetch_url、web_search 和 MCP）的外网请求权限。
# 默认采用保守策略：如果没有该配置段，则不做拦截。
#
# [network]
# default = "prompt"     # allow | deny | prompt (允许 | 拒绝 | 提示确认)
# allow = ["api.deepseek.com", "github.com", ".githubusercontent.com"]
# deny = []
# audit = true            # 记录到 ~/.mimofan/audit.log

# ─────────────────────────────────────────────────────────────────────────────────
# 技能管理 (Skills)
# ─────────────────────────────────────────────────────────────────────────────────
# 配置 `/skill install` 社区技能的安装源。
# [skills]
# registry_url = "https://raw.githubusercontent.com/Hmbown/deepseek-skills/main/index.json"
# max_install_size_bytes = 5_242_880

# ─────────────────────────────────────────────────────────────────────────────────
# 终端界面 (TUI)
# ─────────────────────────────────────────────────────────────────────────────────
[tui]
alternate_screen = "auto"   # 自动使用 TUI 全屏模式
mouse_capture = true        # 启用鼠标文本选中支持
terminal_probe_timeout_ms = 500
stream_chunk_timeout_secs = 300
osc8_links = true            # 在终端中渲染可点击的超链接
# 可以在状态栏底部显示的模块：
# status_items = ["mode", "model", "status", "git_branch", "tokens", "cache"]

# ─────────────────────────────────────────────────────────────────────────────────
# 功能开关 (Feature Flags)
# ─────────────────────────────────────────────────────────────────────────────────
[features]
shell_tool = true
subagents = true
web_search = true
apply_patch = true
mcp = true
exec_policy = true

# ─────────────────────────────────────────────────────────────────────────────────
# 视觉模型 (Vision Model Configuration)
# ─────────────────────────────────────────────────────────────────────────────────
# 用于 `image_analyze` 图片识别工具。
# [vision_model]
# model = "gemini-3.1-flash-lite-preview"
# api_key = "YOUR_API_KEY"

# ─────────────────────────────────────────────────────────────────────────────────
# 失败重试策略 (Retry Configuration)
# ─────────────────────────────────────────────────────────────────────────────────
[retry]
enabled = true
max_retries = 3
initial_delay = 1.0
max_delay = 60.0
exponential_base = 2.0


# ─────────────────────────────────────────────────────────────────────────────────
# 上下文及缓存机制 (Context Compaction)
# ─────────────────────────────────────────────────────────────────────────────────
[context]
enabled = false
verbatim_window_turns = 16
l1_threshold = 192000
l2_threshold = 384000
l3_threshold = 576000
seam_model = "deepseek-v4-flash"

# ─────────────────────────────────────────────────────────────────────────────────
# 并发调度与压力控制 (Capacity Controller)
# ─────────────────────────────────────────────────────────────────────────────────
[capacity]
enabled = false
low_risk_max = 0.50
medium_risk_max = 0.62
severe_min_slack = -0.25
severe_violation_ratio = 0.40
refresh_cooldown_turns = 6
replan_cooldown_turns = 5
max_replay_per_turn = 1
min_turns_before_guardrail = 4
profile_window = 8
deepseek_v3_2_chat_prior = 3.9
deepseek_v3_2_reasoner_prior = 4.1
deepseek_v4_pro_prior = 3.5
deepseek_v4_flash_prior = 4.2
fallback_default_prior = 3.8

# ─────────────────────────────────────────────────────────────────────────────────
# 多环境 Profile 配置示例 (Profile Example)
# ─────────────────────────────────────────────────────────────────────────────────
# 通过 `mimofan --profile <name>` 或 `MIMOFAN_PROFILE=<name>` 来快速切换环境配置。
[profiles.mimo]
provider = "xiaomi-mimo"
api_key = "YOUR_XIAOMI_KEY"
default_text_model = "mimo-v2.5-pro"

[profiles.deepseek]
provider = "deepseek"
api_key = "YOUR_DEEPSEEK_API_KEY"
default_text_model = "deepseek-v4-pro"

[profiles.nvidia-nim]
provider = "nvidia-nim"
api_key = "YOUR_NVIDIA_API_KEY"
base_url = "https://integrate.api.nvidia.com/v1"
default_text_model = "deepseek-ai/deepseek-v4-pro"

# ─────────────────────────────────────────────────────────────────────────────────
# 桌面通知 (Desktop Notifications)
# ─────────────────────────────────────────────────────────────────────────────────
# 当长时间运行的任务完成时，向终端发送提示通知。
# method = "auto" | "osc9" | "bel" | "off"
[notifications]
# method = "auto"
# threshold_secs = 30
# include_summary = false

# ─────────────────────────────────────────────────────────────────────────────────
# 工作区快照 (Workspace Snapshots)
# ─────────────────────────────────────────────────────────────────────────────────
# 在每个回合执行前后创建本地项目快照，方便你使用 `/restore` 撤销 AI 修改。
# 所有的快照将保存在 ~/.mimofan/snapshots/ 目录下。
# [snapshots]
# enabled = true
# max_age_days = 7
# max_workspace_gb = 2

# ─────────────────────────────────────────────────────────────────────────────────
# LSP 代码诊断 (LSP Diagnostics)
# ─────────────────────────────────────────────────────────────────────────────────
# 编辑代码后自动调用本地 LSP 服务器进行诊断，将报错立刻返回给模型。
[lsp]
# enabled = true
# poll_after_edit_ms = 5000
# max_diagnostics_per_file = 20
# include_warnings = false

# ─────────────────────────────────────────────────────────────────────────────────
# 钩子脚本 (Hooks)
# ─────────────────────────────────────────────────────────────────────────────────
# 在工具调用、任务结束等生命周期自动执行 Shell 脚本。
# [hooks]
# enabled = true

# ─────────────────────────────────────────────────────────────────────────────────
# 运行 API (Runtime API)
# ─────────────────────────────────────────────────────────────────────────────────
# 控制本地 HTTP 后端 API 服务允许的跨域来源。
# [runtime_api]
# cors_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]

# ─────────────────────────────────────────────────────────────────────────────────
# 工具覆写与插件 (Tool Overrides & Plugins)
# ─────────────────────────────────────────────────────────────────────────────────
# 你可以将内置工具替换为自己编写的脚本。
# [tools]
# plugin_dir = "~/.mimofan/tools"

# [tools.overrides]
# "exec_shell" = { type = "script", path = "audit-exec-shell.sh" }

# ─────────────────────────────────────────────────────────────────────────────────
# 舰队控制与角色权限 (Agent Fleet trust, security, and role registry)
# ─────────────────────────────────────────────────────────────────────────────────
# [fleet]
# default_trust_level = "sandbox"
# require_identity_verification = true
# max_trust_level = "operator"
