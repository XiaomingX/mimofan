# Opt-in mimo-tui toolbox workflow.
#
# Usage:
#   MIMO_IMAGE=ghcr.io/hmbown/mimo-tui:vX.Y.Z \
#   MIMO_TOOLBOX_IMAGE=mimo-toolbox:my-project \
#   MIMO_HOME_VOLUME=mimo-my-project-home \
#   MIMOFAN_WORKSPACE="$PWD" \
#   docker compose -f docs/examples/compose.toolbox.yml run --rm mimo
#
# Keep MIMO_HOME_VOLUME distinct per project so sessions, config, skills,
# memory, and queued work do not bleed across workspaces.

services:
  mimo:
    image: ${MIMO_TOOLBOX_IMAGE:-mimo-toolbox:local}
    build:
      context: ../..
      dockerfile: docs/examples/Dockerfile.toolbox
      args:
        MIMO_IMAGE: ${MIMO_IMAGE:-ghcr.io/hmbown/mimo-tui:latest}
        TOOLBOX_PACKAGES: ${TOOLBOX_PACKAGES:-git openssh-client curl build-essential pkg-config python3 python3-pip nodejs npm}
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      - MIMO_BASE_URL
      - DEEPSEEK_NO_COLOR
    volumes:
      - mimo-home:/home/mimo/.mimo
      - ${MIMOFAN_WORKSPACE:?set MIMOFAN_WORKSPACE to the project directory}:/workspace
      # Mount SSH material only for projects that need it, and prefer read-only.
      # - ${HOME}/.ssh:/home/mimo/.ssh:ro
      # Mount local CA certificates only when starting through a command that
      # runs `sudo update-ca-certificates` inside this toolbox image.
      # - ${MIMOFAN_CERTS_DIR:-../../docker/certs}:/usr/local/share/ca-certificates/local:ro
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  mimo-home:
    name: ${MIMO_HOME_VOLUME:-mimo-toolbox-home}
